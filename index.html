<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym & Food Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0edf8;
      --surface: #ffffff;
      --border: #e8e3f0;
      --text: #2d2640;
      --text2: #8b7fa8;
      --text3: #c4b8d8;
      --font: 'Nunito', sans-serif;
      --radius: 20px;
      --food: #34d399;
      --food-bg: #ecfdf5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 48px; }
    .container { max-width: 500px; margin: 0 auto; }

    /* HEADER */
    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .header-icon {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(135deg, #ffb347, #f47fb0);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
      box-shadow: 0 4px 12px rgba(255,100,100,0.25);
    }
    .header-title { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; }
    .header-sub { font-size: 0.78rem; color: var(--text2); font-weight: 600; margin-top: 1px; }

    /* TABS */
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      padding: 12px; border-radius: 14px; border: 2px solid var(--border);
      background: var(--surface); font-family: var(--font); font-size: 0.88rem;
      font-weight: 800; color: var(--text2); cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .tab-btn.active { border-color: var(--text); color: var(--text); background: var(--surface); }
    .tab-btn.active.food-tab { border-color: var(--food); color: var(--food); }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border-radius: 16px; padding: 14px 12px; box-shadow: 0 2px 12px rgba(100,80,160,0.07); }
    .stat-label { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); margin-bottom: 4px; }
    .stat-value { font-size: 1.4rem; font-weight: 900; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
    .stat-unit { font-size: 0.65rem; font-weight: 700; color: var(--text2); }

    /* CALENDAR */
    .cal-card { background: var(--surface); border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(100,80,160,0.08); margin-bottom: 20px; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .cal-month-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em; }
    .cal-controls { display: flex; align-items: center; gap: 8px; }
    .btn-today { font-family: var(--font); font-size: 0.72rem; font-weight: 800; color: var(--text2); background: var(--bg); border: none; border-radius: 999px; padding: 5px 12px; cursor: pointer; transition: all 0.15s; }
    .btn-today:hover { background: var(--border); }
    .cal-nav-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: none; color: var(--text2); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 800; transition: all 0.15s; }
    .cal-nav-btn:hover { background: var(--border); color: var(--text); }
    .cal-days-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 8px; }
    .cal-day-label { text-align: center; font-size: 0.68rem; font-weight: 800; color: var(--text3); text-transform: uppercase; padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }

    /* BUBBLES */
    .bubble {
      aspect-ratio: 1; border-radius: 50%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; position: relative;
      background: #ede9f8; font-weight: 800;
    }
    .bubble:hover { transform: scale(1.08); }
    .bubble.other-month { opacity: 0.25; cursor: default; pointer-events: none; }
    .bubble.today { box-shadow: 0 0 0 2.5px var(--text), 0 0 0 4.5px var(--bg); }
    .bubble.selected { box-shadow: 0 0 0 2.5px var(--text), 0 0 0 4.5px var(--bg), 0 6px 16px rgba(100,80,160,0.2); transform: scale(1.1); }
    .bubble-date { font-size: 0.6rem; font-weight: 800; color: rgba(45,38,64,0.4); position: absolute; top: 5px; left: 7px; line-height: 1; }
    .bubble-icon { font-size: 0.8rem; line-height: 1; }
    .bubble-type { font-size: 0.44rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(45,38,64,0.5); margin-top: 1px; }
    .bubble.type-push    { background: linear-gradient(135deg, #ffd18a, #ffb347); box-shadow: 0 3px 10px rgba(255,179,71,0.35); }
    .bubble.type-pull    { background: linear-gradient(135deg, #a8d8f8, #6db8f7); box-shadow: 0 3px 10px rgba(109,184,247,0.35); }
    .bubble.type-leg     { background: linear-gradient(135deg, #a8eab8, #7fd99a); box-shadow: 0 3px 10px rgba(127,217,154,0.35); }
    .bubble.type-arm     { background: linear-gradient(135deg, #ffc0a0, #ff8c5a); box-shadow: 0 3px 10px rgba(255,140,90,0.35); }
    .bubble.type-cardio  { background: linear-gradient(135deg, #f9a8c8, #f47fb0); box-shadow: 0 3px 10px rgba(244,127,176,0.35); }
    .bubble.type-rest    { background: linear-gradient(135deg, #e8e4f4, #d4ceea); }
    /* Food dot indicator */
    .bubble.has-food::before {
      content: '🍽️'; position: absolute; bottom: 3px; right: 3px;
      font-size: 0.5rem; line-height: 1;
    }
    .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.68rem; font-weight: 700; color: var(--text2); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

    /* PANEL */
    .panel { background: var(--surface); border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(100,80,160,0.08); }
    .panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .panel-date { font-size: 1rem; font-weight: 900; }
    .panel-date-sub { font-size: 0.72rem; color: var(--text2); font-weight: 600; margin-top: 2px; }
    .btn-del-session { background: none; border: 1.5px solid #fca5a5; color: #ef4444; border-radius: 10px; padding: 6px 14px; font-family: var(--font); font-size: 0.78rem; font-weight: 800; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-del-session:hover { background: rgba(239,68,68,0.08); }

    /* TYPE PICKER */
    .type-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 16px; }
    .type-btn { aspect-ratio: 1; border-radius: 50%; border: none; cursor: pointer; font-size: 0.95rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; transition: transform 0.15s; font-family: var(--font); }
    .type-btn:hover { transform: scale(1.08); }
    .type-btn.sel { transform: scale(1.1); box-shadow: 0 0 0 2.5px var(--text), 0 0 0 4.5px var(--bg); }
    .type-btn-label { font-size: 0.46rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(45,38,64,0.6); }
    .type-btn.t-push   { background: linear-gradient(135deg, #ffd18a, #ffb347); }
    .type-btn.t-pull   { background: linear-gradient(135deg, #a8d8f8, #6db8f7); }
    .type-btn.t-leg    { background: linear-gradient(135deg, #a8eab8, #7fd99a); }
    .type-btn.t-arm    { background: linear-gradient(135deg, #ffc0a0, #ff8c5a); }
    .type-btn.t-cardio { background: linear-gradient(135deg, #f9a8c8, #f47fb0); }
    .type-btn.t-rest   { background: linear-gradient(135deg, #e8e4f4, #d4ceea); }

    /* EXERCISE */
    .exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .exercise-card { background: var(--bg); border-radius: 14px; padding: 12px 14px; border: 1.5px solid var(--border); }
    .exercise-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .exercise-name { font-size: 0.85rem; font-weight: 800; }
    .btn-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.9rem; padding: 2px 4px; border-radius: 6px; transition: color 0.15s; }
    .btn-del:hover { color: #ef4444; }
    .sets-list { display: flex; flex-direction: column; gap: 5px; }
    .set-row { display: flex; align-items: center; gap: 6px; }
    .set-num { font-size: 0.65rem; font-weight: 800; color: var(--text3); width: 18px; }
    .set-input { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 8px; font-family: var(--font); font-size: 0.8rem; font-weight: 700; color: var(--text); width: 54px; outline: none; transition: border-color 0.15s; text-align: center; }
    .set-input:focus { border-color: var(--text2); }
    .set-sep { font-size: 0.7rem; color: var(--text3); font-weight: 800; }
    .btn-del-set { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.75rem; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; }
    .btn-del-set:hover { color: #ef4444; }
    .btn-add-set { margin-top: 6px; background: none; border: 1.5px dashed var(--border); border-radius: 8px; color: var(--text3); font-family: var(--font); font-size: 0.75rem; font-weight: 800; padding: 5px 10px; cursor: pointer; transition: all 0.15s; width: 100%; }
    .btn-add-set:hover { border-color: var(--text2); color: var(--text2); }
    .btn-add-exercise { width: 100%; padding: 12px; background: var(--bg); border: 1.5px dashed var(--border); border-radius: 14px; font-family: var(--font); font-size: 0.82rem; font-weight: 800; color: var(--text2); cursor: pointer; transition: all 0.15s; margin-bottom: 12px; }
    .btn-add-exercise:hover { border-color: var(--text2); color: var(--text); }

    /* FOOD LOG */
    .food-section { margin-top: 20px; border-top: 1.5px solid var(--border); padding-top: 16px; }
    .food-section-title { font-size: 0.78rem; font-weight: 900; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

    /* MACRO SUMMARY */
    .macro-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .macro-item { background: var(--bg); border-radius: 12px; padding: 10px; text-align: center; }
    .macro-value { font-size: 1.1rem; font-weight: 900; color: var(--text); }
    .macro-label { font-size: 0.6rem; font-weight: 800; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .macro-item.kal .macro-value { color: #f59e0b; }
    .macro-item.pro .macro-value { color: #3b82f6; }
    .macro-item.kar .macro-value { color: #10b981; }
    .macro-item.lem .macro-value { color: #f97316; }

    /* FOOD CARDS */
    .food-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .food-card { background: var(--bg); border-radius: 12px; padding: 10px 12px; border: 1.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .food-thumb { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; background: var(--border); flex-shrink: 0; }
    .food-thumb-placeholder { width: 48px; height: 48px; border-radius: 10px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
    .food-info { flex: 1; min-width: 0; }
    .food-name { font-size: 0.82rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .food-macros { font-size: 0.68rem; color: var(--text2); font-weight: 700; margin-top: 2px; }
    .food-meal-tag { font-size: 0.58rem; font-weight: 800; padding: 2px 7px; border-radius: 999px; background: var(--border); color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; }
    .btn-del-food { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.85rem; padding: 4px; border-radius: 6px; transition: color 0.15s; flex-shrink: 0; }
    .btn-del-food:hover { color: #ef4444; }

    /* ADD FOOD BTN */
    .btn-add-food {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #6ee7b7, #34d399);
      border: none; border-radius: 14px; font-family: var(--font); font-size: 0.88rem;
      font-weight: 900; color: #064e3b; cursor: pointer; transition: opacity 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px;
    }
    .btn-add-food:hover { opacity: 0.88; }

    /* FOOD MODAL */
    .food-overlay { position: fixed; inset: 0; background: rgba(45,38,64,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 500; padding: 16px; backdrop-filter: blur(4px); }
    .food-sheet { background: var(--surface); border-radius: 24px 24px 16px 16px; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; animation: slideUp 0.2s ease; }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .food-sheet-title { font-size: 1rem; font-weight: 900; margin-bottom: 14px; }

    /* PHOTO UPLOAD */
    .photo-upload-area {
      border: 2px dashed var(--border); border-radius: 16px; padding: 24px;
      text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 14px;
      position: relative; overflow: hidden;
    }
    .photo-upload-area:hover { border-color: var(--food); background: var(--food-bg); }
    .photo-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .photo-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; display: none; }
    .photo-upload-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
    .photo-upload-text { font-size: 0.82rem; font-weight: 700; color: var(--text2); }

    /* ANALYZE BTN */
    .btn-analyze {
      width: 100%; padding: 13px; background: var(--text); color: var(--bg);
      border: none; border-radius: 12px; font-family: var(--font); font-size: 0.88rem;
      font-weight: 900; cursor: pointer; transition: opacity 0.15s; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-analyze:hover { opacity: 0.85; }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    /* RESULT */
    .ai-result { background: var(--bg); border-radius: 14px; padding: 14px; margin-bottom: 14px; display: none; }
    .ai-result-name { font-size: 0.95rem; font-weight: 900; margin-bottom: 10px; }
    .ai-macros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
    .ai-macro { background: var(--surface); border-radius: 10px; padding: 8px; text-align: center; }
    .ai-macro-val { font-size: 1rem; font-weight: 900; }
    .ai-macro-lbl { font-size: 0.58rem; font-weight: 800; color: var(--text2); text-transform: uppercase; }
    .meal-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
    .meal-btn { padding: 8px 4px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-family: var(--font); font-size: 0.7rem; font-weight: 800; color: var(--text2); cursor: pointer; transition: all 0.15s; text-align: center; }
    .meal-btn.sel { border-color: var(--food); color: var(--food); background: var(--food-bg); }
    .food-name-input { width: 100%; padding: 10px 12px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; font-family: var(--font); font-size: 0.85rem; font-weight: 700; color: var(--text); outline: none; margin-bottom: 10px; }
    .food-name-input:focus { border-color: var(--food); }

    /* SAVE / CANCEL */
    .sheet-actions { display: flex; gap: 8px; }
    .btn-save-food { flex: 1; padding: 13px; background: linear-gradient(135deg, #6ee7b7, #34d399); border: none; border-radius: 12px; font-family: var(--font); font-size: 0.88rem; font-weight: 900; color: #064e3b; cursor: pointer; transition: opacity 0.15s; }
    .btn-save-food:hover { opacity: 0.88; }
    .btn-cancel { padding: 13px 18px; background: none; border: 1.5px solid var(--border); border-radius: 12px; font-family: var(--font); font-size: 0.88rem; font-weight: 800; color: var(--text2); cursor: pointer; }

    /* SAVE GYM */
    .btn-save { width: 100%; padding: 14px; background: var(--text); color: var(--bg); border: none; border-radius: 14px; font-family: var(--font); font-size: 0.9rem; font-weight: 900; cursor: pointer; transition: opacity 0.15s; }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* PICKER */
    .picker-overlay { position: fixed; inset: 0; background: rgba(45,38,64,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 600; padding: 16px; backdrop-filter: blur(4px); }
    .picker-sheet { background: var(--surface); border-radius: 24px 24px 16px 16px; padding: 20px; width: 100%; max-width: 500px; max-height: 70vh; overflow-y: auto; animation: slideUp 0.2s ease; }
    .picker-title { font-size: 1rem; font-weight: 900; margin-bottom: 14px; }
    .picker-list { display: flex; flex-direction: column; gap: 6px; }
    .picker-item { padding: 11px 14px; background: var(--bg); border-radius: 12px; border: none; text-align: left; font-family: var(--font); font-size: 0.85rem; font-weight: 700; color: var(--text); cursor: pointer; transition: all 0.12s; }
    .picker-item:hover { background: var(--border); }

    /* EMPTY */
    .empty { text-align: center; padding: 2rem 1rem; color: var(--text3); }
    .empty .eicon { font-size: 2rem; margin-bottom: 8px; display: block; }
    .empty p { font-size: 0.8rem; font-weight: 700; line-height: 1.6; }

    /* TOAST */
    #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--bg); font-family: var(--font); font-weight: 800; font-size: 0.85rem; padding: 10px 22px; border-radius: 999px; transition: transform 0.25s; z-index: 999; white-space: nowrap; pointer-events: none; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">🏋️</div>
    <div>
      <div class="header-title">Super Tracker</div>
      <div class="header-sub">Gym + Food — semua dalam satu tempat</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-gym" onclick="switchTab('gym')">🏋️ Gym</button>
    <button class="tab-btn food-tab" id="tab-food" onclick="switchTab('food')">🍽️ Food</button>
  </div>

  <div class="stats" id="stats-bar">
    <div class="stat-card"><div class="stat-label">🔥 Streak</div><div class="stat-value" id="stat-streak">0 <span class="stat-unit">hari</span></div></div>
    <div class="stat-card"><div class="stat-label">💪 Sesi</div><div class="stat-value" id="stat-sessions">0 <span class="stat-unit">sesi</span></div></div>
    <div class="stat-card"><div class="stat-label">🍽️ Kalori</div><div class="stat-value" id="stat-kal">0 <span class="stat-unit">kcal</span></div></div>
    <div class="stat-card"><div class="stat-label">🥩 Protein</div><div class="stat-value" id="stat-pro">0 <span class="stat-unit">g</span></div></div>
  </div>

  <div class="cal-card">
    <div class="cal-header">
      <div class="cal-month-title" id="cal-month"></div>
      <div class="cal-controls">
        <button class="btn-today" onclick="goToday()">Hari ini</button>
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-days-header">
      <div class="cal-day-label">Sen</div><div class="cal-day-label">Sel</div>
      <div class="cal-day-label">Rab</div><div class="cal-day-label">Kam</div>
      <div class="cal-day-label">Jum</div><div class="cal-day-label">Sab</div>
      <div class="cal-day-label">Min</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ffb347"></div>Push</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6db8f7"></div>Pull</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7fd99a"></div>Leg</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff8c5a"></div>Arm</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f47fb0"></div>Cardio</div>
      <div class="legend-item">🍽️ Ada food log</div>
    </div>
  </div>

  <div class="panel" id="main-panel">
    <div class="empty"><span class="eicon">📅</span><p>Ketuk gelembung tanggal<br>untuk mulai catat.</p></div>
  </div>

</div>
<div id="toast"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL = 'https://pvqbjqjjwwcmzajldlzo.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2cWJqcWpqd3djbXphamxkbHpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNjk1NzksImV4cCI6MjA5NjY0NTU3OX0.3IeD44BUsjvlvRQU6lcfWysT5nyZxq9eZCNEZ2HN-WA'
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { db: { schema: 'gym' } })
  function getORKey() {
    let key = localStorage.getItem('or_key')
    if (!key) {
      key = prompt('Masukkan OpenRouter API Key:')
      if (key) localStorage.setItem('or_key', key)
    }
    return key
  }

  const TYPES = {
    push:   { label: 'Push',      emoji: '💪' },
    pull:   { label: 'Pull',      emoji: '🔙' },
    leg:    { label: 'Leg',       emoji: '🦵' },
    arm:    { label: 'Arm',       emoji: '💪' },
    cardio: { label: 'Cardio',    emoji: '🏃' },
    rest:   { label: 'Istirahat', emoji: '😴' },
  }
  const PRESETS = {
    push:   ['Bench Press','Incline Bench','Decline Bench','Cable Fly','Push Up','Dumbbell Fly','Overhead Press','Lateral Raise','Chest Dip'],
    pull:   ['Pull Up','Lat Pulldown','Seated Row','Bent Over Row','Deadlift','Face Pull','T-Bar Row'],
    leg:    ['Squat','Leg Press','Romanian Deadlift','Leg Extension','Leg Curl','Calf Raise','Hack Squat','Bulgarian Split Squat'],
    arm:    ['Barbell Curl','Hammer Curl','Preacher Curl','Cable Curl','Tricep Pushdown','Skull Crusher','Overhead Tricep Ext','Dips','Close Grip Bench'],
    cardio: ['Treadmill','Elliptical','Cycling','Jump Rope','Rowing Machine','Stair Climber','HIIT'],
    rest:   [],
  }
  const MEALS = ['Sarapan','Makan Siang','Snack','Makan Malam']
  const MONTH_NAMES = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember']

  const today = new Date()
  const todayStr = toDateStr(today)
  let calYear = today.getFullYear(), calMonth = today.getMonth()
  let selectedDate = null, activeTab = 'gym'
  let sessionsMap = {}, foodMap = {}
  let currentSession = { type: null, exercises: [] }, loadedSessionId = null
  let currentFood = [], loadedFoodDayId = null

  function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
  function formatDisplay(ds) { return new Date(ds+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) }

  // ─── TAB ──────────────────────────────────────────────────────────────────
  window.switchTab = (tab) => {
    activeTab = tab
    document.getElementById('tab-gym').classList.toggle('active', tab === 'gym')
    document.getElementById('tab-food').classList.toggle('active', tab === 'food')
    if (selectedDate) renderPanel()
  }

  // ─── LOAD ─────────────────────────────────────────────────────────────────
  async function loadAll() {
    const [{ data: sessions }, { data: foods }] = await Promise.all([
      supabase.from('sessions').select('*, exercises(*)'),
      supabase.from('food_days').select('*, food_entries(*)')
    ])
    sessionsMap = {}
    let totalSets = 0, totalEx = 0
    ;(sessions || []).forEach(s => {
      const exs = (s.exercises || []).map(e => ({ ...e, sets: e.sets || [] }))
      sessionsMap[s.date] = { id: s.id, type: s.type, exercises: exs }
      totalEx += exs.length
      exs.forEach(e => { totalSets += e.sets.length })
    })
    foodMap = {}
    let todayKal = 0, todayPro = 0
    ;(foods || []).forEach(fd => {
      foodMap[fd.date] = { id: fd.id, entries: fd.food_entries || [] }
    })
    const todayFood = foodMap[todayStr]?.entries || []
    todayFood.forEach(e => { todayKal += e.calories || 0; todayPro += e.protein || 0 })

    const gymDays = Object.keys(sessionsMap).filter(d => sessionsMap[d].type !== 'rest').length
    let streak = 0, cur = new Date(today)
    while (sessionsMap[toDateStr(cur)]) { streak++; cur.setDate(cur.getDate()-1) }

    document.getElementById('stat-streak').innerHTML = `${streak} <span class="stat-unit">hari</span>`
    document.getElementById('stat-sessions').innerHTML = `${gymDays} <span class="stat-unit">sesi</span>`
    document.getElementById('stat-kal').innerHTML = `${todayKal} <span class="stat-unit">kcal</span>`
    document.getElementById('stat-pro').innerHTML = `${todayPro} <span class="stat-unit">g</span>`
    renderCalendar()
  }

  // ─── CALENDAR ─────────────────────────────────────────────────────────────
  function renderCalendar() {
    document.getElementById('cal-month').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`
    const grid = document.getElementById('cal-grid')
    grid.innerHTML = ''
    const first = new Date(calYear, calMonth, 1)
    const startOffset = (first.getDay() + 6) % 7
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate()
    const daysInPrev = new Date(calYear, calMonth, 0).getDate()
    for (let i = startOffset-1; i >= 0; i--) grid.appendChild(makeBubble(daysInPrev-i, null, true))
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
      grid.appendChild(makeBubble(d, ds, false, sessionsMap[ds]?.type, ds===todayStr, ds===selectedDate, !!foodMap[ds]))
    }
    const total = startOffset + daysInMonth
    const rem = total % 7 === 0 ? 0 : 7 - (total % 7)
    for (let d = 1; d <= rem; d++) grid.appendChild(makeBubble(d, null, true))
  }

  function makeBubble(day, ds, otherMonth, type, isToday, isSel, hasFood) {
    const div = document.createElement('div')
    const cls = ['bubble']
    if (otherMonth) cls.push('other-month')
    if (type) cls.push(`type-${type}`)
    if (isToday) cls.push('today')
    if (isSel) cls.push('selected')
    if (hasFood) cls.push('has-food')
    div.className = cls.join(' ')
    if (!otherMonth) {
      const t = TYPES[type]
      div.innerHTML = `<span class="bubble-date">${day}</span>${type ? `<span class="bubble-icon">${t.emoji}</span><span class="bubble-type">${t.label}</span>` : `<span style="font-size:0.72rem;font-weight:800;color:rgba(45,38,64,0.18)">${day}</span>`}`
      div.addEventListener('click', () => selectDate(ds))
    }
    return div
  }

  window.changeMonth = dir => { calMonth += dir; if (calMonth>11){calMonth=0;calYear++} if (calMonth<0){calMonth=11;calYear--} renderCalendar() }
  window.goToday = () => { calYear=today.getFullYear(); calMonth=today.getMonth(); renderCalendar(); selectDate(todayStr) }

  async function selectDate(ds) {
    selectedDate = ds
    renderCalendar()
    // Load gym
    const ex = sessionsMap[ds]
    if (ex) { loadedSessionId = ex.id; currentSession = { type: ex.type, exercises: JSON.parse(JSON.stringify(ex.exercises)) } }
    else { loadedSessionId = null; currentSession = { type: null, exercises: [] } }
    // Load food
    const fd = foodMap[ds]
    if (fd) { loadedFoodDayId = fd.id; currentFood = JSON.parse(JSON.stringify(fd.entries)) }
    else { loadedFoodDayId = null; currentFood = [] }
    renderPanel()
  }

  // ─── RENDER PANEL ─────────────────────────────────────────────────────────
  function renderPanel() {
    if (!selectedDate) return
    if (activeTab === 'gym') renderGymPanel()
    else renderFoodPanel()
  }

  // ─── GYM PANEL ────────────────────────────────────────────────────────────
  function renderGymPanel() {
    const panel = document.getElementById('main-panel')
    const isRest = currentSession.type === 'rest'
    panel.innerHTML = `
      <div class="panel-header">
        <div>
          <div class="panel-date">${formatDisplay(selectedDate)}</div>
          <div class="panel-date-sub">${currentSession.type ? `Tipe: ${TYPES[currentSession.type].label}` : 'Pilih tipe latihan'}</div>
        </div>
        ${loadedSessionId ? `<button class="btn-del-session" onclick="deleteSession()">🗑️ Hapus</button>` : ''}
      </div>
      <div class="type-picker">
        ${Object.entries(TYPES).map(([key,t]) => `<button class="type-btn t-${key} ${currentSession.type===key?'sel':''}" onclick="setType('${key}')"><span>${t.emoji}</span><span class="type-btn-label">${t.label}</span></button>`).join('')}
      </div>
      ${!isRest && currentSession.type ? `
        <div class="exercise-list">
          ${currentSession.exercises.length === 0
            ? `<div class="empty"><span class="eicon">💪</span><p>Belum ada exercise.<br>Tambah di bawah.</p></div>`
            : currentSession.exercises.map((ex,ei) => `
              <div class="exercise-card">
                <div class="exercise-card-top">
                  <div class="exercise-name">${ex.exercise}</div>
                  <button class="btn-del" onclick="removeExercise(${ei})">✕</button>
                </div>
                <div class="sets-list">
                  ${ex.sets.map((s,si) => `
                    <div class="set-row">
                      <span class="set-num">${si+1}</span>
                      <input class="set-input" type="number" placeholder="reps" value="${s.reps||''}" onchange="updateSet(${ei},${si},'reps',this.value)"/>
                      <span class="set-sep">×</span>
                      <input class="set-input" type="number" placeholder="kg" value="${s.weight||''}" step="0.5" onchange="updateSet(${ei},${si},'weight',this.value)"/>
                      <span class="set-sep" style="font-size:0.62rem;color:var(--text3)">kg</span>
                      <button class="btn-del-set" onclick="removeSet(${ei},${si})">✕</button>
                    </div>`).join('')}
                </div>
                <button class="btn-add-set" onclick="addSet(${ei})">+ Set</button>
              </div>`).join('')}
        </div>
        <button class="btn-add-exercise" onclick="openPicker()">+ Tambah Exercise</button>
      ` : ''}
      ${currentSession.type ? `<button class="btn-save" onclick="saveSession()">💾 Simpan Sesi</button>` : ''}
    `
  }

  // ─── FOOD PANEL ───────────────────────────────────────────────────────────
  function renderFoodPanel() {
    const panel = document.getElementById('main-panel')
    const totalKal = currentFood.reduce((a,f) => a+(f.calories||0), 0)
    const totalPro = currentFood.reduce((a,f) => a+(f.protein||0), 0)
    const totalKar = currentFood.reduce((a,f) => a+(f.carbs||0), 0)
    const totalLem = currentFood.reduce((a,f) => a+(f.fat||0), 0)

    panel.innerHTML = `
      <div class="panel-header">
        <div>
          <div class="panel-date">${formatDisplay(selectedDate)}</div>
          <div class="panel-date-sub">Food Log</div>
        </div>
      </div>
      <div class="macro-bar">
        <div class="macro-item kal"><div class="macro-value">${totalKal}</div><div class="macro-label">kcal</div></div>
        <div class="macro-item pro"><div class="macro-value">${totalPro}g</div><div class="macro-label">Protein</div></div>
        <div class="macro-item kar"><div class="macro-value">${totalKar}g</div><div class="macro-label">Karbo</div></div>
        <div class="macro-item lem"><div class="macro-value">${totalLem}g</div><div class="macro-label">Lemak</div></div>
      </div>
      <div class="food-list">
        ${currentFood.length === 0
          ? `<div class="empty"><span class="eicon">🍽️</span><p>Belum ada makanan dicatat.<br>Foto makananmu di bawah!</p></div>`
          : currentFood.map((f,i) => `
            <div class="food-card">
              ${f.image ? `<img class="food-thumb" src="${f.image}" />` : `<div class="food-thumb-placeholder">🍽️</div>`}
              <div class="food-info">
                <div class="food-name">${f.name}</div>
                <div class="food-macros">${f.calories} kcal · ${f.protein}g protein · ${f.carbs}g karbo · ${f.fat}g lemak</div>
                <div style="margin-top:4px"><span class="food-meal-tag">${f.meal||'Lainnya'}</span></div>
              </div>
              <button class="btn-del-food" onclick="deleteFood(${i})">✕</button>
            </div>`).join('')}
      </div>
      <button class="btn-add-food" onclick="openFoodModal()">📸 Foto Makanan</button>
    `
  }

  // ─── GYM ACTIONS ──────────────────────────────────────────────────────────
  window.setType = type => { currentSession.type = type; if (type==='rest') currentSession.exercises=[]; renderGymPanel() }
  window.openPicker = () => {
    const exs = PRESETS[currentSession.type] || []
    const overlay = document.createElement('div')
    overlay.className = 'picker-overlay'
    overlay.innerHTML = `<div class="picker-sheet"><div class="picker-title">${TYPES[currentSession.type].emoji} Pilih Exercise</div><div class="picker-list">${exs.map(ex=>`<button class="picker-item" onclick="addExercise('${ex}')">${ex}</button>`).join('')}</div></div>`
    overlay.addEventListener('click', e => { if (e.target===overlay) overlay.remove() })
    document.body.appendChild(overlay)
  }
  window.addExercise = ex => { document.querySelector('.picker-overlay')?.remove(); currentSession.exercises.push({exercise:ex,sets:[{reps:'',weight:''}]}); renderGymPanel() }
  window.removeExercise = ei => { currentSession.exercises.splice(ei,1); renderGymPanel() }
  window.addSet = ei => { currentSession.exercises[ei].sets.push({reps:'',weight:''}); renderGymPanel() }
  window.removeSet = (ei,si) => { if (currentSession.exercises[ei].sets.length<=1) return; currentSession.exercises[ei].sets.splice(si,1); renderGymPanel() }
  window.updateSet = (ei,si,field,val) => { currentSession.exercises[ei].sets[si][field] = val ? Number(val) : '' }

  window.saveSession = async () => {
    if (!selectedDate || !currentSession.type) return
    const btn = document.querySelector('.btn-save'); if (btn) { btn.disabled=true; btn.textContent='Menyimpan...' }
    try {
      let sid = loadedSessionId
      if (!sid) { const {data,error} = await supabase.from('sessions').insert({date:selectedDate,type:currentSession.type}).select().single(); if(error) throw error; sid=data.id; loadedSessionId=sid }
      else await supabase.from('sessions').update({type:currentSession.type}).eq('id',sid)
      await supabase.from('exercises').delete().eq('session_id',sid)
      if (currentSession.exercises.length>0) { const {error} = await supabase.from('exercises').insert(currentSession.exercises.map(ex=>({session_id:sid,muscle:currentSession.type,exercise:ex.exercise,sets:ex.sets}))); if(error) throw error }
      await loadAll(); selectDate(selectedDate); showToast('✅ Sesi disimpan!')
    } catch(err) { showToast('❌ '+err.message) }
  }

  window.deleteSession = async () => {
    if (!loadedSessionId || !confirm('Hapus sesi ini?')) return
    await supabase.from('sessions').delete().eq('id',loadedSessionId)
    delete sessionsMap[selectedDate]; loadedSessionId=null; currentSession={type:null,exercises:[]}
    await loadAll(); selectDate(selectedDate); showToast('🗑️ Sesi dihapus')
  }

  // ─── FOOD ACTIONS ─────────────────────────────────────────────────────────
  let aiResult = null, selectedMeal = 'Makan Siang', photoB64 = null

  window.openFoodModal = () => {
    aiResult = null; photoB64 = null; selectedMeal = 'Makan Siang'
    const overlay = document.createElement('div')
    overlay.className = 'food-overlay'
    overlay.id = 'food-overlay'
    overlay.innerHTML = `
      <div class="food-sheet">
        <div class="food-sheet-title">📸 Tambah Makanan</div>
        <img class="photo-preview" id="photo-preview" />
        <div class="photo-upload-area" id="upload-area">
          <input type="file" accept="image/*" capture="environment" id="food-file-input" onchange="handlePhoto(event)" />
          <span class="photo-upload-icon">📷</span>
          <div class="photo-upload-text">Ketuk untuk foto atau pilih gambar</div>
        </div>
        <button class="btn-analyze" id="btn-analyze" onclick="analyzePhoto()" disabled>🤖 Analisis dengan AI</button>
        <div class="ai-result" id="ai-result"></div>
        <div class="sheet-actions">
          <button class="btn-save-food" onclick="saveFoodEntry()" id="btn-save-food" style="display:none">✅ Simpan</button>
          <button class="btn-cancel" onclick="closeFoodModal()">Batal</button>
        </div>
      </div>
    `
    overlay.addEventListener('click', e => { if (e.target===overlay) overlay.remove() })
    document.body.appendChild(overlay)
  }

  window.handlePhoto = (e) => {
    const file = e.target.files[0]; if (!file) return
    const reader = new FileReader()
    reader.onload = (ev) => {
      const img = new Image()
      img.onload = () => {
        const canvas = document.createElement('canvas')
        const MAX = 800
        let w = img.width, h = img.height
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX }
          else { w = Math.round(w * MAX / h); h = MAX }
        }
        canvas.width = w; canvas.height = h
        canvas.getContext('2d').drawImage(img, 0, 0, w, h)
        const resized = canvas.toDataURL('image/jpeg', 0.7)
        photoB64 = resized.split(',')[1]
        const preview = document.getElementById('photo-preview')
        preview.src = resized; preview.style.display = 'block'
        document.getElementById('upload-area').style.display = 'none'
        document.getElementById('btn-analyze').disabled = false
      }
      img.src = ev.target.result
    }
    reader.readAsDataURL(file)
  }

  window.analyzePhoto = async () => {
    const btn = document.getElementById('btn-analyze')
    btn.disabled = true; btn.textContent = '🤖 Menganalisis...'
    try {
      const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getORKey()}`,
        },
        body: JSON.stringify({
          model: 'google/gemma-4-26b-a4b-it:free',
          messages: [{
            role: 'user',
            content: [
              { type: 'image_url', image_url: { url: `data:image/jpeg;base64,${photoB64}` } },
              { type: 'text', text: 'What food is in this image? Reply with ONLY a JSON object, no markdown, no explanation: {"name":"food name in Indonesian","calories":400,"protein":15,"carbs":50,"fat":12}' }
            ]
          }]
        })
      })
      if (!resp.ok) throw new Error(`OpenRouter error: ${resp.status}`)
      const data = await resp.json()
      console.log('OR response:', JSON.stringify(data))
      const text = data.choices?.[0]?.message?.content || ''
      console.log('OR text:', text)
      const jsonMatch = text.match(/\{[\s\S]*\}/)
      if (!jsonMatch) throw new Error('Format respons AI tidak valid')
      aiResult = JSON.parse(jsonMatch[0])
      showAIResult()
    } catch(err) {
      showToast('❌ Gagal analisis: ' + err.message)
    }
    btn.disabled = false; btn.textContent = '🤖 Analisis dengan AI'
  }

  function showAIResult() {
    if (!aiResult) return
    const el = document.getElementById('ai-result')
    el.style.display = 'block'
    el.innerHTML = `
      <div class="ai-result-name">🍽️ ${aiResult.name}</div>
      <div class="ai-macros">
        <div class="ai-macro"><div class="ai-macro-val" style="color:#f59e0b">${aiResult.calories}</div><div class="ai-macro-lbl">kcal</div></div>
        <div class="ai-macro"><div class="ai-macro-val" style="color:#3b82f6">${aiResult.protein}g</div><div class="ai-macro-lbl">protein</div></div>
        <div class="ai-macro"><div class="ai-macro-val" style="color:#10b981">${aiResult.carbs}g</div><div class="ai-macro-lbl">karbo</div></div>
        <div class="ai-macro"><div class="ai-macro-val" style="color:#f97316">${aiResult.fat}g</div><div class="ai-macro-lbl">lemak</div></div>
      </div>
      <input class="food-name-input" id="food-name-edit" value="${aiResult.name}" placeholder="Nama makanan..." />
      <div class="meal-picker">
        ${MEALS.map(m => `<button class="meal-btn ${m===selectedMeal?'sel':''}" onclick="selectMeal('${m}')">${m}</button>`).join('')}
      </div>
    `
    document.getElementById('btn-save-food').style.display = 'block'
  }

  window.selectMeal = (m) => {
    selectedMeal = m
    document.querySelectorAll('.meal-btn').forEach(b => b.classList.toggle('sel', b.textContent===m))
  }

  window.saveFoodEntry = async () => {
    if (!aiResult) return
    const name = document.getElementById('food-name-edit')?.value || aiResult.name
    const preview = document.getElementById('photo-preview')
    const entry = {
      name, meal: selectedMeal,
      calories: aiResult.calories, protein: aiResult.protein,
      carbs: aiResult.carbs, fat: aiResult.fat,
      image: preview?.src || null,
    }

    try {
      let fdId = loadedFoodDayId
      if (!fdId) {
        const { data, error } = await supabase.from('food_days').insert({ date: selectedDate }).select().single()
        if (error) throw error
        fdId = data.id; loadedFoodDayId = fdId
      }
      const { error } = await supabase.from('food_entries').insert({ food_day_id: fdId, ...entry })
      if (error) throw error
      currentFood.push(entry)
      await loadAll(); closeFoodModal(); renderFoodPanel(); showToast('✅ Makanan disimpan!')
    } catch(err) { showToast('❌ ' + err.message) }
  }

  window.deleteFood = async (idx) => {
    currentFood.splice(idx, 1)
    // Re-save all entries for this day
    if (loadedFoodDayId) {
      await supabase.from('food_entries').delete().eq('food_day_id', loadedFoodDayId)
      if (currentFood.length > 0) await supabase.from('food_entries').insert(currentFood.map(f => ({ food_day_id: loadedFoodDayId, ...f })))
      else { await supabase.from('food_days').delete().eq('id', loadedFoodDayId); loadedFoodDayId = null }
    }
    await loadAll(); renderFoodPanel(); showToast('🗑️ Dihapus')
  }

  window.closeFoodModal = () => document.getElementById('food-overlay')?.remove()

  // ─── TOAST ────────────────────────────────────────────────────────────────
  let toastTimer
  function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg; t.style.transform = 'translateX(-50%) translateY(0)'
    clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(80px)' }, 2500)
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  await loadAll()
  selectDate(todayStr)
</script>
</body>
</html>
